# v1: faster-whisper, L4, concurrency=64. Likely VRAM-pressured on the 24GB card.
cell_id: v1_fw_l4_concurrent_64
framework: faster_whisper
model: openai/whisper-large-v3
gpu: L4

workload:
  pattern: concurrent_streaming
  concurrency: 64
  eval_set: librispeech_streaming_30s
  iterations: 3
  warmup_requests: 10
  request_timeout_seconds: 360

adapter_config:
  device: cuda
  compute_type: float16
  language: en
  beam_size: 5
