# v1: HF Transformers baseline, L4, concurrency=8
cell_id: v1_hf_l4_concurrent_8
framework: hf
model: openai/whisper-large-v3
gpu: L4

workload:
  pattern: concurrent_streaming
  concurrency: 8
  eval_set: librispeech_streaming_30s
  iterations: 3
  warmup_requests: 10
  request_timeout_seconds: 300

adapter_config:
  device: cuda
  dtype: float16
  language: en
