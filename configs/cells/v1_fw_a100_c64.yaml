# v1: faster-whisper, A100, concurrency=64
cell_id: v1_fw_a100_concurrent_64
framework: faster_whisper
model: openai/whisper-large-v3
gpu: A100-SXM4-80GB

workload:
  pattern: concurrent_streaming
  concurrency: 64
  eval_set: librispeech_streaming_30s
  iterations: 3
  warmup_requests: 10
