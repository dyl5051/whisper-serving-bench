# v1: HF Transformers baseline, A100, concurrency=128 (push the saturation envelope)
cell_id: v1_hf_a100_concurrent_128
framework: hf
model: openai/whisper-large-v3
gpu: A100-SXM4-80GB

workload:
  pattern: concurrent_streaming
  concurrency: 128
  eval_set: librispeech_streaming_30s
  iterations: 3
  warmup_requests: 10
  request_timeout_seconds: 480

adapter_config:
  device: cuda
  dtype: float16
  language: en
