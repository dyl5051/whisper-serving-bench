# v1.0.1 experiment: faster-whisper × L4 × c=64, beam_size=1 (greedy).
# May OOM on 24GB L4 with beam=1 — beam=5 already OOMed at c=32 on L4.
# We test anyway; the cell will record as 'unsupported' if OOM hits.
cell_id: v1_fw_beam1_l4_concurrent_64
framework: faster_whisper
model: openai/whisper-large-v3
gpu: L4

workload:
  pattern: concurrent_streaming
  concurrency: 64
  eval_set: librispeech_streaming_30s
  iterations: 3
  warmup_requests: 10
  request_timeout_seconds: 360

adapter_config:
  device: cuda
  compute_type: float16
  language: en
  beam_size: 1
