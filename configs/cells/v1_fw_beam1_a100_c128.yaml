# v1.0.1 experiment: faster-whisper × A100 × c=128, beam_size=1 (greedy).
cell_id: v1_fw_beam1_a100_concurrent_128
framework: faster_whisper
model: openai/whisper-large-v3
gpu: A100-SXM4-80GB

workload:
  pattern: concurrent_streaming
  concurrency: 128
  eval_set: librispeech_streaming_30s
  iterations: 3
  warmup_requests: 10
  request_timeout_seconds: 300

adapter_config:
  device: cuda
  compute_type: float16
  language: en
  beam_size: 1
