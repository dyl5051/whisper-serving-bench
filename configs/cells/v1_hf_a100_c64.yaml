# v1: HF Transformers baseline, A100, concurrency=64
cell_id: v1_hf_a100_concurrent_64
framework: hf
model: openai/whisper-large-v3
gpu: A100-SXM4-80GB

workload:
  pattern: concurrent_streaming
  concurrency: 64
  eval_set: librispeech_streaming_30s
  iterations: 3
  warmup_requests: 10
  request_timeout_seconds: 360

adapter_config:
  device: cuda
  dtype: float16
  language: en
