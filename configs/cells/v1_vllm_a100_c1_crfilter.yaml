# v1.0.1 hallucination-fixes experiment: post-hoc compression-ratio filter.
# After vLLM returns text, gzip-compress it; if ratio > 2.4 (faster-whisper's
# default), discard as a likely hallucination loop and return empty string.
# Emulates the safeguard openai-whisper applies but vLLM's Whisper wrapper
# omits. Operates purely on output text — no audio preprocessing.
cell_id: v1_vllm_a100_c1_crfilter
framework: vllm
model: openai/whisper-large-v3
gpu: A100-SXM4-80GB

workload:
  pattern: concurrent_streaming
  concurrency: 1
  eval_set: librispeech_streaming_30s
  iterations: 3
  warmup_requests: 10
  request_timeout_seconds: 120

adapter_config:
  port: 8765
  dtype: float16
  max_num_seqs: 64
  gpu_memory_utilization: 0.85
  language: en
  server_startup_timeout_seconds: 240
  compression_ratio_threshold: 2.4
