# v1: vLLM, A100 SXM 80GB, concurrency=8
cell_id: v1_vllm_a100_concurrent_8
framework: vllm
model: openai/whisper-large-v3
gpu: A100-SXM4-80GB

workload:
  pattern: concurrent_streaming
  concurrency: 8
  eval_set: librispeech_streaming_30s
  iterations: 3
  warmup_requests: 10
  request_timeout_seconds: 180

adapter_config:
  port: 8765
  dtype: float16
  max_num_seqs: 64
  gpu_memory_utilization: 0.85
  language: en
  server_startup_timeout_seconds: 240
