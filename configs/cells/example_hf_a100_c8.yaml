# Example cell config: HF Transformers baseline on A100, 8 concurrent workers,
# small eval set for fast iteration. Use this to validate the harness end-to-end
# before running the full v1 sweep.
#
# Run with:
#   python scripts/run_cell.py configs/cells/example_hf_a100_c8.yaml

cell_id: hf_a100_concurrent_8_smoke
framework: hf
model: openai/whisper-large-v3
gpu: A100-SXM4-40GB

workload:
  pattern: concurrent_streaming
  concurrency: 8
  eval_set: librispeech_test_clean_subset
  iterations: 1
  warmup_requests: 5
  request_timeout_seconds: 60

adapter_config:
  device: cuda
  dtype: float16
  language: en
