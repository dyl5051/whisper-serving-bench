# v1.0.1 hallucination-fixes experiment: silero-vad audio pre-filtering.
# Strip non-speech regions from the audio before sending to vLLM. Attacks
# the root cause (vLLM Whisper hallucinates ON SILENCE; remove the silence
# and it has less to freelance on). Most likely of the three variants to
# rescue WER, biggest dependency surface.
cell_id: v1_vllm_a100_c1_vad
framework: vllm
model: openai/whisper-large-v3
gpu: A100-SXM4-80GB

workload:
  pattern: concurrent_streaming
  concurrency: 1
  eval_set: librispeech_streaming_30s
  iterations: 3
  warmup_requests: 10
  request_timeout_seconds: 120

adapter_config:
  port: 8765
  dtype: float16
  max_num_seqs: 64
  gpu_memory_utilization: 0.85
  language: en
  server_startup_timeout_seconds: 240
  vad_filter_input: true
