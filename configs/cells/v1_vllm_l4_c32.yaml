# v1: vLLM, L4, concurrency=32
cell_id: v1_vllm_l4_concurrent_32
framework: vllm
model: openai/whisper-large-v3
gpu: L4

workload:
  pattern: concurrent_streaming
  concurrency: 32
  eval_set: librispeech_streaming_30s
  iterations: 3
  warmup_requests: 10
  request_timeout_seconds: 300

adapter_config:
  port: 8765
  dtype: float16
  max_num_seqs: 64
  gpu_memory_utilization: 0.85
  language: en
  server_startup_timeout_seconds: 240
